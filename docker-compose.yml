services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: akademikapp_rabbitmq
    ports: 
      - "5672:5672"
      - "15672:15672" 

  db-pengguna:
    container_name: db-pengguna-akademikapp
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: pass2410511002
    volumes:
      - ./services/authService/database/schemaPengguna.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/pengguna:/var/lib/mysql
  
  db-dosen:
    container_name: db-dosen-akademikapp
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: pass2410511002
    volumes:
      - ./services/dosenService/database/schemaDosen.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/dosen:/var/lib/mysql
  
  db-mahasiswa:
    container_name: db-mahasiswa-akademikapp
    image: mysql:8.0
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: pass2410511002
    volumes:
      - ./services/mahasiswaService/database/schemaMahasiswa.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql_data/mahasiswa:/var/lib/mysql